name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build + update CSP
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_RULESET_ID: ${{ secrets.CF_RULESET_ID }}
          CF_RULE_ID: ${{ secrets.CF_RULE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: pnpm build

      - name: Deploy to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude=scanner/ --exclude=api/config.php --exclude=.htaccess --exclude=.user.ini --exclude=.well-known/
          path: dist/
          remote_path: /www/wwwroot/backstage.click/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_port: ${{ secrets.SSH_PORT }}

      - name: Purge Cloudflare cache
        run: |
          curl -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
