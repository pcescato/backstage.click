<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 630"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Backstage</title>
  <desc id="desc">
    Audit, migration et optimisation de sites web pour organismes de formation et TPE/PME
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="24" />
  <rect x="64" y="80" width="12" height="470" rx="6" fill="url(#accent)" />
  <text
    x="120"
    y="235"
    fill="#ffffff"
    font-family="Inter, Arial, sans-serif"
    font-size="88"
    font-weight="700"
  >
    Backstage
  </text>
  <text x="120" y="320" fill="#d1d5db" font-family="Inter, Arial, sans-serif" font-size="34">
    Audit, migration et optimisation de sites web
  </text>
  <text x="120" y="368" fill="#d1d5db" font-family="Inter, Arial, sans-serif" font-size="34">
    pour organismes de formation et TPE/PME
  </text>
  <text
    x="120"
    y="520"
    fill="#fb923c"
    font-family="Inter, Arial, sans-serif"
    font-size="28"
    font-weight="600"
  >
    backstage.click
  </text>
</svg>
